services:
  postgres:
    image: postgres:16-alpine
    container_name: gg_manager_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gg
      POSTGRES_PASSWORD: gg_password
      POSTGRES_DB: gg_manager
    ports:
      - "5432:5432"
    volumes:
      - gg_manager_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gg -d gg_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gg_manager_pg_data:

