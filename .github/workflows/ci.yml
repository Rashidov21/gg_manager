name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gg
          POSTGRES_PASSWORD: gg_password
          POSTGRES_DB: gg_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gg"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm --workspace apps/server run prisma:generate
      - run: npm run typecheck
      - run: npm test
        env:
          DATABASE_URL: postgresql://gg:gg_password@localhost:5432/gg_manager?schema=public
          TELEGRAM_BOT_TOKEN: dummy_token
          TELEGRAM_OWNER_CHAT_ID: dummy_chat
          JWT_ACCESS_SECRET: test_access_secret_123456
          JWT_REFRESH_SECRET: test_refresh_secret_123456
